<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion de Score EPS - Sport Collectif</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Gestion de Score EPS</h1>
            <p class="subtitle">Sport Collectif - 2 Équipes</p>
        </header>

        <main>
            <!-- Configuration des équipes -->
            <section class="team-config">
                <div class="team">
                    <label for="team1">Équipe 1:</label>
                    <input type="text" id="team1" value="Équipe A" placeholder="Nom de l'équipe">
                </div>
                <div class="team">
                    <label for="team2">Équipe 2:</label>
                    <input type="text" id="team2" value="Équipe B" placeholder="Nom de l'équipe">
                </div>
            </section>

            <!-- Affichage des scores -->
            <section class="scoreboard">
                <div class="score-team" id="score-team1">
                    <h2 id="team1-name">Équipe A</h2>
                    <div class="score-display" id="score1">0</div>
                    <div class="score-controls">
                        <button onclick="decrementScore(1)" class="btn btn-decrement">-</button>
                        <button onclick="incrementScore(1)" class="btn btn-increment">+</button>
                    </div>
                </div>

                <div class="separator">VS</div>

                <div class="score-team" id="score-team2">
                    <h2 id="team2-name">Équipe B</h2>
                    <div class="score-display" id="score2">0</div>
                    <div class="score-controls">
                        <button onclick="decrementScore(2)" class="btn btn-decrement">-</button>
                        <button onclick="incrementScore(2)" class="btn btn-increment">+</button>
                    </div>
                </div>
            </section>

            <!-- Boutons d'action -->
            <section class="actions">
                <button onclick="resetScores()" class="btn btn-reset">Réinitialiser</button>
                <button onclick="swapTeams()" class="btn btn-swap">Échanger les équipes</button>
            </section>

            <!-- Chronomètre -->
            <section class="timer-section">
                <h3>Chronomètre</h3>
                <div class="timer-display" id="timer">00:00:00</div>
                <div class="timer-controls">
                    <button onclick="startTimer()" class="btn btn-start" id="startBtn">Démarrer</button>
                    <button onclick="pauseTimer()" class="btn btn-pause" id="pauseBtn" disabled>Pause</button>
                    <button onclick="resetTimer()" class="btn btn-reset">Réinit</button>
                </div>
            </section>

            <!-- Historique -->
            <section class="history">
                <h3>Historique des actions</h3>
                <ul id="history-list"></ul>
                <button onclick="clearHistory()" class="btn btn-clear">Effacer l'historique</button>
            </section>
        </main>

        <footer>
            <p>Application EPS - Gestion de score pour sport collectif</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
