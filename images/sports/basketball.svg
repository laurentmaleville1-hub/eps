<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <!-- Manga style basketball player -->
  <defs>
    <linearGradient id="skin" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffdab9"/>
      <stop offset="100%" style="stop-color:#f4a460"/>
    </linearGradient>
    <linearGradient id="hair" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2c2c"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="jersey" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a52"/>
    </linearGradient>
    <linearGradient id="shadow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(0,0,0,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.4)"/>
    </linearGradient>
    <filter id="manga" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Shadow -->
  <ellipse cx="150" cy="380" rx="80" ry="20" fill="url(#shadow)" opacity="0.5"/>
  
  <!-- Legs -->
  <path d="M120 280 L110 350 L130 350 Z" fill="url(#jersey)" stroke="#000" stroke-width="2"/>
  <path d="M180 280 L170 350 L190 350 Z" fill="url(#jersey)" stroke="#000" stroke-width="2"/>
  
  <!-- Body -->
  <path d="M130 180 L170 180 L180 280 L120 280 Z" fill="url(#jersey)" stroke="#000" stroke-width="2"/>
  
  <!-- Arms -->
  <path d="M120 180 L80 220 L90 220 L130 180 Z" fill="url(#skin)" stroke="#000" stroke-width="2"/>
  <path d="M180 180 L220 220 L210 220 L170 180 Z" fill="url(#skin)" stroke="#000" stroke-width="2"/>
  
  <!-- Head -->
  <circle cx="150" cy="140" r="30" fill="url(#skin)" stroke="#000" stroke-width="2"/>
  
  <!-- Hair -->
  <path d="M130 120 L140 110 L160 110 L170 120 L165 130 L155 130 L145 130 Z" fill="url(#hair)" stroke="#000" stroke-width="1"/>
  <path d="M140 110 L150 100 L160 110" fill="url(#hair)" stroke="#000" stroke-width="1"/>
  
  <!-- Eyes (manga style) -->
  <ellipse cx="140" cy="135" rx="8" ry="12" fill="#000" stroke="#000" stroke-width="2"/>
  <ellipse cx="160" cy="135" rx="8" ry="12" fill="#000" stroke="#000" stroke-width="2"/>
  <circle cx="142" cy="132" r="3" fill="#fff"/>
  <circle cx="162" cy="132" r="3" fill="#fff"/>
  
  <!-- Mouth -->
  <path d="M145 150 Q150 155 155 150" fill="none" stroke="#000" stroke-width="1.5"/>
  
  <!-- Eyebrows -->
  <path d="M135 125 L145 120" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  <path d="M155 120 L165 125" fill="none" stroke="#000" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Basketball -->
  <circle cx="220" cy="200" r="25" fill="#ff8c42" stroke="#000" stroke-width="2"/>
  <path d="M210 190 L230 210" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M210 210 L230 190" fill="none" stroke="#000" stroke-width="2"/>
  <circle cx="220" cy="200" r="20" fill="none" stroke="#000" stroke-width="1"/>
  
  <!-- Jersey details -->
  <path d="M140 190 L160 190" fill="none" stroke="#fff" stroke-width="3"/>
  <path d="M140 210 L160 210" fill="none" stroke="#fff" stroke-width="3"/>
  <path d="M140 230 L160 230" fill="none" stroke="#fff" stroke-width="3"/>
  
  <!-- Shoes -->
  <ellipse cx="120" cy="350" rx="25" ry="10" fill="#fff" stroke="#000" stroke-width="2"/>
  <ellipse cx="180" cy="350" rx="25" ry="10" fill="#fff" stroke="#000" stroke-width="2"/>
  
  <!-- Action lines (manga effect) -->
  <path d="M200 180 L240 160" fill="none" stroke="#fff" stroke-width="3" opacity="0.8" stroke-linecap="round"/>
  <path d="M210 190 L250 170" fill="none" stroke="#fff" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
</svg>
