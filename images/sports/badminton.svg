<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 400" width="300" height="400">
  <!-- Manga style badminton player -->
  <defs>
    <linearGradient id="skin6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffdab9"/>
      <stop offset="100%" style="stop-color:#f4a460"/>
    </linearGradient>
    <linearGradient id="hair6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c2c2c"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="jersey6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e91e63"/>
      <stop offset="100%" style="stop-color:#c2185b"/>
    </linearGradient>
    <linearGradient id="shadow6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(0,0,0,0.2)"/>
      <stop offset="100%" style="stop-color:rgba(0,0,0,0.4)"/>
    </linearGradient>
    <linearGradient id="racket" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffeb3b"/>
      <stop offset="100%" style="stop-color:#fbc02d"/>
    </linearGradient>
  </defs>
  
  <!-- Shadow -->
  <ellipse cx="150" cy="380" rx="80" ry="20" fill="url(#shadow6)" opacity="0.5"/>
  
  <!-- Action pose (smashing) -->
  <!-- Legs -->
  <path d="M120 280 L110 350 L130 350 Z" fill="url(#jersey6)" stroke="#000" stroke-width="2"/>
  <path d="M160 240 L150 350 L170 350 Z" fill="url(#jersey6)" stroke="#000" stroke-width="2"/>
  
  <!-- Body -->
  <path d="M130 180 L170 200 L180 240 L120 280 Z" fill="url(#jersey6)" stroke="#000" stroke-width="2"/>
  
  <!-- Arms (smashing) -->
  <path d="M130 180 L80 160 L90 160 L130 180 Z" fill="url(#skin6)" stroke="#000" stroke-width="2"/>
  <path d="M170 200 L210 180 L200 180 L170 200 Z" fill="url(#skin6)" stroke="#000" stroke-width="2"/>
  
  <!-- Head -->
  <circle cx="150" cy="140" r="28" fill="url(#skin6)" stroke="#000" stroke-width="2"/>
  
  <!-- Hair (long flowing) -->
  <path d="M120 100 L130 80 L140 85 L150 75 L160 85 L170 80 L180 100 L175 110 L165 115 L155 120 L145 115 L135 110 Z" fill="url(#hair6)" stroke="#000" stroke-width="1"/>
  <path d="M130 80 L150 60 L170 80" fill="url(#hair6)" stroke="#000" stroke-width="1"/>
  
  <!-- Eyes (manga style - focused) -->
  <ellipse cx="140" cy="135" rx="12" ry="8" fill="#000" stroke="#000" stroke-width="2"/>
  <ellipse cx="160" cy="135" rx="12" ry="8" fill="#000" stroke="#000" stroke-width="2"/>
  <circle cx="142" cy="132" r="5" fill="#fff"/>
  <circle cx="162" cy="132" r="5" fill="#fff"/>
  
  <!-- Mouth (open - shouting) -->
  <ellipse cx="150" cy="150" rx="10" ry="6" fill="none" stroke="#000" stroke-width="2"/>
  
  <!-- Eyebrows -->
  <path d="M125 125 L135 120" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  <path d="M145 120 L155 125" fill="none" stroke="#000" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Badminton Racket -->
  <path d="M220 180 L260 180 L265 220 L225 220 Z" fill="url(#racket)" stroke="#000" stroke-width="2"/>
  <circle cx="240" cy="200" r="20" fill="none" stroke="#000" stroke-width="2"/>
  <path d="M230 190 L250 210" fill="none" stroke="#000" stroke-width="1"/>
  <path d="M230 210 L250 190" fill="none" stroke="#000" stroke-width="1"/>
  <path d="M240 180 L240 220" fill="none" stroke="#000" stroke-width="1"/>
  
  <!-- Shuttlecock -->
  <circle cx="280" cy="160" r="8" fill="#fff" stroke="#000" stroke-width="1"/>
  <path d="M275 150 L280 140 L285 150" fill="#fff" stroke="#000" stroke-width="1"/>
  <path d="M270 155 L280 145 L290 155" fill="#fff" stroke="#000" stroke-width="1"/>
  
  <!-- Jersey details -->
  <path d="M140 190 L160 190" fill="none" stroke="#fff" stroke-width="2"/>
  <path d="M140 210 L160 210" fill="none" stroke="#fff" stroke-width="2"/>
  
  <!-- Skirt/Shorts -->
  <path d="M110 260 L170 260 L170 280 L110 280 Z" fill="#fff" stroke="#000" stroke-width="2"/>
  
  <!-- Shoes -->
  <ellipse cx="120" cy="350" rx="20" ry="8" fill="#fff" stroke="#000" stroke-width="1"/>
  <ellipse cx="160" cy="350" rx="20" ry="8" fill="#fff" stroke="#000" stroke-width="1"/>
  
  <!-- Action lines (smash effect) -->
  <path d="M200 160 L240 140" fill="none" stroke="#fff" stroke-width="4" opacity="0.8" stroke-linecap="round"/>
  <path d="M210 170 L250 150" fill="none" stroke="#fff" stroke-width="3" opacity="0.6" stroke-linecap="round"/>
  <path d="M220 180 L260 160" fill="none" stroke="#fff" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <path d="M280 140 L300 120" fill="none" stroke="#000" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
</svg>
